<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kowshika Srinivasan — README</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css">
  <style>
    body{background:#f6f8fa;padding:40px}
    .markdown-body{max-width:980px;margin:0 auto;padding:45px;background:#fff;border-radius:6px;box-shadow:0 1px 3px rgba(27,31,35,.04)}
  </style>
</head>
<body>
  <article class="markdown-body" id="content">Loading README...</article>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const rawUrl = 'https://raw.githubusercontent.com/KowshikaSinivasan/KowshikaSinivasan/main/README.md';
    fetch(rawUrl)
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById('content').textContent = 'Failed to load README: ' + err;
      });
  </script>
</body>
</html>
